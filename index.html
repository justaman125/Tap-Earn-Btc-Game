<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tap-to-Earn Game</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background:#0d0d0d;
  color:#fff;
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:20px;
  overflow:hidden;
}

.screen{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:14px;
  width:100%;
  max-width:420px;
  animation:fadeIn 0.25s ease;
}
.screen.active{display:flex;}

@keyframes fadeIn{
  from{opacity:0;transform:translateX(20px);}
  to{opacity:1;transform:translateX(0);}
}

h1{
  color:#0ff;
  text-shadow:0 0 12px #0ff;
}

input{
  width:220px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
}
input:focus{outline:none;box-shadow:0 0 10px #0ff;}

button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:#0ff;
  color:#000;
  font-weight:700;
  cursor:pointer;
  transition:0.25s;
}
button:active{transform:scale(0.95);}

.nav{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.nav button{
  background:#111;
  color:#0ff;
  box-shadow:0 0 10px #0ff;
}

.tap-button{
  width:220px;
  height:220px;
  border-radius:50%;
  font-size:3.5rem;
  background:linear-gradient(145deg,#0ff,#0055ff);
  box-shadow:0 0 25px #0ff,0 0 60px #0ff inset;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  touch-action:manipulation;
}
.tap-button:active{transform:scale(0.94);}
</style>
</head>

<body>

<div id="loginScreen" class="screen active">
  <h1>Login / Sign Up</h1>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Enter</button>
</div>

<div id="gameScreen" class="screen">
  <div class="nav">
    <button id="tabGame">Game</button>
    <button id="tabColors">Colors</button>
    <button id="tabChars">Characters</button>
    <button id="tabLeaderboard">Leaderboard</button>
  </div>

  <h1>Tap-to-Earn</h1>
  <div>Coins: <span id="coins">0</span></div>
  <div>Multiplier: <span id="multiplier">1x</span></div>
  <div>Level <span id="level">1</span></div>

  <div class="tap-button" id="tapButton">🐵</div>
</div>

<script>
let user=null;
let coins=0, multiplier=1, level=1, xp=0;
let screenHistory=["gameScreen"];
let startX=0;

const qs=id=>document.getElementById(id);

/* ===== SAVE / LOAD (FIXED) ===== */
function save(){
  if(!user) return;
  localStorage.setItem("user_"+user, JSON.stringify({
    coins, multiplier, level, xp
  }));
}

function load(){
  const data = JSON.parse(localStorage.getItem("user_"+user));
  if(!data) return;
  coins = data.coins ?? 0;
  multiplier = data.multiplier ?? 1;
  level = data.level ?? 1;
  xp = data.xp ?? 0;
}

/* ===== UI ===== */
function updateUI(){
  qs("coins").textContent = coins;
  qs("multiplier").textContent = multiplier+"x";
  qs("level").textContent = level;
}

/* ===== NAV ===== */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  qs(id).classList.add("active");
  if(screenHistory[screenHistory.length-1]!==id){
    screenHistory.push(id);
  }
}

/* ===== SWIPE BACK ===== */
document.addEventListener("touchstart",e=>{
  startX = e.touches[0].clientX;
});
document.addEventListener("touchend",e=>{
  if(e.changedTouches[0].clientX - startX > 80 && screenHistory.length>1){
    screenHistory.pop();
    show(screenHistory[screenHistory.length-1]);
  }
});

/* ===== LOGIN ===== */
qs("loginBtn").onclick=()=>{
  const u = qs("username").value.trim();
  const p = qs("password").value.trim();
  if(!u || !p) return;

  const pass = localStorage.getItem("pass_"+u);
  if(!pass) localStorage.setItem("pass_"+u,p);
  else if(pass!==p) return;

  user = u;
  load();
  updateUI();

  qs("loginScreen").classList.remove("active");
  show("gameScreen");
};

/* ===== TAP ===== */
qs("tapButton").onclick=()=>{
  coins += multiplier;
  xp += multiplier;

  if(xp >= level*100){
    xp = 0;
    level++;
    multiplier++;
  }

  updateUI();
  save();
};
</script>

</body>
</html>
