<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tap-to-Earn Game</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background:#0d0d0d;
  color:#fff;
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:20px;
  overflow:hidden;
}

.screen{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:14px;
  width:100%;
  max-width:420px;
  animation:fadeIn .25s ease;
}
.screen.active{display:flex;}

@keyframes fadeIn{
  from{opacity:0;transform:translateX(20px);}
  to{opacity:1;transform:translateX(0);}
}

h1{color:#0ff;text-shadow:0 0 12px #0ff;}

button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:#0ff;
  font-weight:700;
  cursor:pointer;
}
.nav{display:flex;gap:10px;flex-wrap:wrap;}
.nav button{background:#111;color:#0ff;box-shadow:0 0 10px #0ff;}

.tap-button{
  width:220px;height:220px;border-radius:50%;
  font-size:3.5rem;
  background:linear-gradient(145deg,#0ff,#0055ff);
  box-shadow:0 0 25px #0ff,0 0 60px #0ff inset;
  display:flex;justify-content:center;align-items:center;
}
.tap-button:active{transform:scale(.94);}

.coin{
  position:absolute;
  pointer-events:none;
  animation:coinFloat 1s forwards;
}
@keyframes coinFloat{
  to{transform:translate(var(--x),var(--y));opacity:0;}
}

#levelUpOverlay{
  position:fixed;inset:0;
  background:radial-gradient(circle,#0ff,#000);
  display:flex;justify-content:center;align-items:center;
  font-size:3rem;font-weight:700;
  opacity:0;pointer-events:none;
}
#levelUpOverlay.active{animation:flash 1.2s ease forwards;}
@keyframes flash{
  0%{opacity:0;transform:scale(.6);}
  20%{opacity:1;transform:scale(1.2);}
  100%{opacity:0;transform:scale(1.4);}
}
</style>
</head>

<body>

<div id="levelUpOverlay">LEVEL UP!</div>

<div id="loginScreen" class="screen active">
  <h1>Login</h1>
  <input id="username" placeholder="Username">
  <button id="loginBtn">Enter</button>
</div>

<div id="gameScreen" class="screen">
  <div class="nav">
    <button id="tabGame">Game</button>
    <button id="tabColors">Colors</button>
    <button id="tabChars">Characters</button>
    <button id="tabLeaderboard">Leaderboard</button>
  </div>

  <h1>Tap-to-Earn</h1>
  <div>Coins: <span id="coins">0</span></div>
  <div>Multiplier: <span id="multiplier">1x</span></div>
  <div>Level: <span id="level">1</span></div>

  <div class="tap-button" id="tapButton">🐵</div>
</div>

<div id="colorsScreen" class="screen"><h1>Colors</h1></div>
<div id="charsScreen" class="screen"><h1>Characters</h1></div>
<div id="leaderboardScreen" class="screen"><h1>Leaderboard</h1></div>

<script>
let user=null;
let coins=0,multiplier=1,level=1,xp=0;
let screenHistory=["gameScreen"];
let startX=0;

const qs=id=>document.getElementById(id);

/* ===== LOCAL STORAGE ===== */
function save(){
  localStorage.setItem("save_"+user,JSON.stringify({
    coins,multiplier,level,xp
  }));
}
function load(){
  const d=JSON.parse(localStorage.getItem("save_"+user));
  if(!d)return;
  coins=d.coins;
  multiplier=d.multiplier;
  level=d.level;
  xp=d.xp;
}
function updateUI(){
  qs("coins").textContent=coins;
  qs("multiplier").textContent=multiplier+"x";
  qs("level").textContent=level;
}

/* ===== NAV + SWIPE BACK ===== */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  qs(id).classList.add("active");
  if(screenHistory.at(-1)!==id)screenHistory.push(id);
}
document.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
document.addEventListener("touchend",e=>{
  if(e.changedTouches[0].clientX-startX>80 && screenHistory.length>1){
    screenHistory.pop();
    show(screenHistory.at(-1));
  }
});

/* ===== LOGIN ===== */
qs("loginBtn").onclick=()=>{
  user=qs("username").value.trim();
  if(!user)return;
  load();
  updateUI();
  qs("loginScreen").classList.remove("active");
  show("gameScreen");
};

/* ===== TAPPING ===== */
qs("tapButton").onclick=e=>{
  coins+=multiplier;
  xp+=multiplier;

  if(xp>=level*100){
    xp=0;level++;multiplier++;
    qs("levelUpOverlay").classList.add("active");
    setTimeout(()=>qs("levelUpOverlay").classList.remove("active"),1200);
  }

  const r=e.target.getBoundingClientRect();
  const c=document.createElement("div");
  c.className="coin";c.textContent="🪙";
  c.style.left=r.left+r.width/2+"px";
  c.style.top=r.top+r.height/2+"px";
  c.style.setProperty("--x",(Math.random()*120-60)+"px");
  c.style.setProperty("--y",(Math.random()*-120)+"px");
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),1000);

  save();
  updateUI();
};

/* NAV BUTTONS */
tabGame.onclick=()=>show("gameScreen");
tabColors.onclick=()=>show("colorsScreen");
tabChars.onclick=()=>show("charsScreen");
tabLeaderboard.onclick=()=>show("leaderboardScreen");
</script>

</body>
</html>
