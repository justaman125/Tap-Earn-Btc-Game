<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tap-to-Earn Game</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#0d0d0d;
  color:#fff;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:20px;
  overflow:hidden;
}

.screen{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:15px;
  width:100%;
  max-width:420px;
}

.screen.active{display:flex;}

h1{
  color:#0ff;
  text-shadow:0 0 12px #0ff;
}

input{
  width:220px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
}

input:focus{
  outline:none;
  box-shadow:0 0 10px #0ff;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:#0ff;
  color:#000;
  font-weight:700;
  cursor:pointer;
  transition:0.25s;
}

button:hover{transform:scale(1.05);}
button:active{transform:scale(0.95);}

.alert{
  font-size:0.9rem;
  color:#f0f;
  opacity:0;
  transition:0.3s;
}

.nav{
  display:flex;
  gap:10px;
}

.nav button{
  background:#111;
  color:#0ff;
  box-shadow:0 0 10px #0ff;
}

.counter,.multiplier,.level{
  font-size:1.1rem;
}

.tap-wrapper{
  position:relative;
}

.tap-button{
  width:220px;
  height:220px;
  border-radius:50%;
  font-size:3.5rem;
  background:linear-gradient(145deg,#0ff,#0055ff);
  box-shadow:0 0 25px #0ff,0 0 60px #0ff inset;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.15s;
  touch-action:manipulation;
}

.tap-button:active{transform:scale(0.94);}

.shop,.quests,.cosmetics,.characters,.colors{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.shop button,.cosmetics button,.characters button,.colors button{
  background:#111;
  color:#0ff;
  box-shadow:0 0 10px #0ff;
}

/* COIN FLOAT */
.coin{
  position:absolute;
  font-size:1.5rem;
  pointer-events:none;
  animation:coinFloat 1s forwards;
}

@keyframes coinFloat{
  0%{transform:translate(0,0) scale(1);opacity:1;}
  100%{transform:translate(var(--x),var(--y)) scale(0.8);opacity:0;}
}

/* RIPPLE */
.ripple{
  position:absolute;
  width:20px;
  height:20px;
  border-radius:50%;
  border:2px solid #0ff;
  animation:ripple 0.6s ease-out forwards;
  pointer-events:none;
}

@keyframes ripple{
  0%{transform:scale(0.2);opacity:0.8;}
  100%{transform:scale(6);opacity:0;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <h1>Login / Sign Up</h1>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Enter</button>
  <div class="alert" id="loginAlert"></div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div class="nav">
    <button id="tabGame">Game</button>
    <button id="tabCosmetics">Cosmetics</button>
    <button id="tabCharacters">Characters</button>
  </div>

  <h1>Tap-to-Earn</h1>
  <div class="counter">Coins: <span id="coins">0</span></div>
  <div class="multiplier">Multiplier: <span id="multiplier">1x</span></div>
  <div class="level">Level <span id="level">1</span></div>

  <div class="tap-wrapper">
    <div class="tap-button" id="tapButton">🐵</div>
  </div>

  <div class="shop">
    <button data-x="2">Upgrade +2x (100)</button>
    <button data-x="5">Upgrade +5x (500)</button>
    <button data-x="10">Upgrade +10x (2000)</button>
  </div>

  <div class="quests">
    <div id="questText">Tap 20 times</div>
  </div>

  <div class="alert" id="gameAlert"></div>
</div>

<!-- COSMETICS -->
<div id="cosmeticsScreen" class="screen">
  <div class="nav">
    <button id="tabGame2">Game</button>
    <button id="tabCosmetics2">Cosmetics</button>
    <button id="tabCharacters2">Characters</button>
  </div>

  <h1>Button Colors</h1>
  <div class="colors">
    <button data-color="purple">Purple (500)</button>
    <button data-color="red">Red (500)</button>
    <button data-color="green">Green (500)</button>
    <button data-color="gold">Gold (1000)</button>
  </div>
</div>

<!-- CHARACTERS -->
<div id="charactersScreen" class="screen">
  <div class="nav">
    <button id="tabGame3">Game</button>
    <button id="tabCosmetics3">Cosmetics</button>
    <button id="tabCharacters3">Characters</button>
  </div>

  <h1>Characters</h1>
  <div class="characters">
    <button data-char="🐵">Monkey (free)</button>
    <button data-char="🦄">Unicorn (1000)</button>
    <button data-char="👽">Alien (2000)</button>
  </div>
</div>

<script>
let user=null,coins=0,multiplier=1,level=1,xp=0;
let ownedColors={},selectedColor=null;
let ownedChars={"🐵":true},selectedChar="🐵";
let upgradeCost={2:100,5:500,10:2000};
let taps=0;

const qs=id=>document.getElementById(id);

function save(){
  localStorage.setItem("user_"+user,JSON.stringify({
    coins,multiplier,level,xp,
    ownedColors,selectedColor,
    ownedChars,selectedChar,
    upgradeCost,taps
  }));
}

function load(){
  const d=JSON.parse(localStorage.getItem("user_"+user));
  if(!d)return;
  Object.assign(this,d);
}

function updateUI(){
  qs("coins").textContent=coins;
  qs("multiplier").textContent=multiplier+"x";
  qs("level").textContent=level;
  qs("tapButton").textContent=selectedChar;
  if(selectedColor){
    const map={
      purple:["#a020f0","#8000ff"],
      red:["#ff4040","#ff0000"],
      green:["#40ff40","#00ff00"],
      gold:["#ffd700","#ffb700"]
    };
    qs("tapButton").style.background=`linear-gradient(145deg,${map[selectedColor][0]},${map[selectedColor][1]})`;
  }
}

function alertMsg(msg,el){
  el.textContent=msg;
  el.style.opacity=1;
  setTimeout(()=>el.style.opacity=0,1000);
}

/* LOGIN */
qs("loginBtn").onclick=()=>{
  const u=qs("username").value.trim();
  const p=qs("password").value.trim();
  if(!u||!p)return alertMsg("Fill fields",qs("loginAlert"));
  const pass=localStorage.getItem("pass_"+u);
  if(!pass) localStorage.setItem("pass_"+u,p);
  else if(pass!==p) return alertMsg("Wrong password",qs("loginAlert"));
  user=u;
  load();
  qs("loginScreen").classList.remove("active");
  qs("gameScreen").classList.add("active");
  updateUI();
};

/* TAP EFFECTS */
function spawnCoin(x,y){
  const c=document.createElement("div");
  c.className="coin";
  c.textContent="🪙";
  c.style.left=x+"px";
  c.style.top=y+"px";
  c.style.setProperty("--x",(Math.random()*120-60)+"px");
  c.style.setProperty("--y",(Math.random()*-120)+"px");
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),1000);
}

function spawnRipple(x,y){
  const r=document.createElement("div");
  r.className="ripple";
  r.style.left=x+"px";
  r.style.top=y+"px";
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),600);
}

qs("tapButton").onclick=e=>{
  coins+=multiplier;
  xp+=multiplier;
  taps++;
  if(xp>=level*100){xp=0;level++;multiplier++;}
  const rect=e.target.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;
  spawnRipple(cx-10,cy-10);
  for(let i=0;i<multiplier;i++) spawnCoin(cx,cy);
  save();
  updateUI();
};

/* UPGRADES */
document.querySelectorAll(".shop button").forEach(b=>{
  b.onclick=()=>{
    const x=+b.dataset.x;
    if(coins<upgradeCost[x]) return alertMsg("Not enough coins",qs("gameAlert"));
    coins-=upgradeCost[x];
    multiplier+=x;
    upgradeCost[x]=Math.floor(upgradeCost[x]*2.3);
    save();updateUI();
  };
});

/* COLORS */
document.querySelectorAll(".colors button").forEach(b=>{
  b.onclick=()=>{
    const c=b.dataset.color;
    const cost=c==="gold"?1000:500;
    if(!ownedColors[c] && coins<cost) return;
    if(!ownedColors[c]){coins-=cost;ownedColors[c]=true;}
    selectedColor=c;
    save();updateUI();
  };
});

/* CHARACTERS */
document.querySelectorAll(".characters button").forEach(b=>{
  b.onclick=()=>{
    const c=b.dataset.char;
    const cost=c==="🦄"?1000:c==="👽"?2000:0;
    if(!ownedChars[c] && coins<cost) return;
    if(!ownedChars[c]){coins-=cost;ownedChars[c]=true;}
    selectedChar=c;
    save();updateUI();
  };
});

/* NAV */
function show(s){
  ["gameScreen","cosmeticsScreen","charactersScreen"].forEach(x=>qs(x).classList.remove("active"));
  qs(s).classList.add("active");
}

qs("tabGame").onclick=()=>show("gameScreen");
qs("tabGame2").onclick=()=>show("gameScreen");
qs("tabGame3").onclick=()=>show("gameScreen");
qs("tabCosmetics").onclick=()=>show("cosmeticsScreen");
qs("tabCosmetics2").onclick=()=>show("cosmeticsScreen");
qs("tabCosmetics3").onclick=()=>show("cosmeticsScreen");
qs("tabCharacters").onclick=()=>show("charactersScreen");
qs("tabCharacters2").onclick=()=>show("charactersScreen");
qs("tabCharacters3").onclick=()=>show("charactersScreen");
</script>

</body>
</html>
