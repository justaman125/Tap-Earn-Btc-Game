<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TapVerse</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,system-ui}
body{
  background:#0d0d0d;
  color:#fff;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.app{
  width:100%;
  max-width:420px;
  height:100vh;
  display:flex;
  flex-direction:column;
  padding:16px;
}
.screen{display:none;flex:1;flex-direction:column;gap:14px}
.screen.active{display:flex}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.stat{
  background:#111;
  padding:8px 14px;
  border-radius:14px;
  box-shadow:0 0 10px rgba(0,255,255,.3);
}
.tap-btn{
  flex:1;
  margin:20px 0;
  border-radius:50%;
  background:radial-gradient(circle at top,#0ff,#006);
  box-shadow:0 0 40px #0ff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  font-weight:700;
  user-select:none;
  touch-action:manipulation;
  transition:transform .15s, box-shadow .15s;
}
.tap-btn:active{
  transform:scale(.93);
  box-shadow:0 0 20px #0ff;
}
.section{
  background:#111;
  border-radius:18px;
  padding:14px;
  box-shadow:0 0 12px rgba(140,0,255,.3);
}
button{
  border:none;
  padding:12px;
  border-radius:14px;
  background:#1a1a1a;
  color:#0ff;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 0 10px rgba(0,255,255,.4);
  transition:.2s;
}
button:active{transform:scale(.95)}
button:disabled{opacity:.4;box-shadow:none}
.shop-btn{display:flex;justify-content:space-between}
.nav{
  display:flex;
  gap:10px;
}
.back-btn{
  width:max-content;
  padding:8px 14px;
  background:#111;
  box-shadow:0 0 10px #0ff;
}
.alert{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:10px 16px;
  border-radius:14px;
  box-shadow:0 0 14px #f0f;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}
.alert.show{opacity:1}
.levelup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  font-weight:700;
  color:#0ff;
  text-shadow:0 0 30px #0ff;
  opacity:0;
  pointer-events:none;
  transition:.4s;
}
.levelup.show{opacity:1}
input{
  padding:12px;
  border-radius:14px;
  border:none;
  background:#111;
  color:#fff;
  box-shadow:0 0 10px rgba(0,255,255,.2);
}
</style>
</head>
<body>
<div class="app">

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <h2>TapVerse</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login / Signup</button>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div class="top">
    <div class="stat">🪙 <span id="coins">0</span></div>
    <div class="stat">x<span id="multi">1</span></div>
  </div>

  <div class="tap-btn" id="tapBtn">TAP</div>

  <div class="section">
    <h3>Shop</h3>
    <button class="shop-btn" onclick="buyUpgrade(2)">2x <span>100</span></button>
    <button class="shop-btn" onclick="buyUpgrade(5)">5x <span>500</span></button>
    <button class="shop-btn" onclick="buyUpgrade(10)">10x <span>2000</span></button>
  </div>

  <div class="nav">
    <button onclick="show('colorsScreen')">🎨</button>
    <button onclick="show('charsScreen')">😈</button>
    <button onclick="show('leaderboardScreen')">🏆</button>
  </div>
</div>

<!-- COLORS -->
<div id="colorsScreen" class="screen">
  <button class="back-btn" onclick="back()">⬅ Back</button>
  <h3>Button Colors</h3>
  <button onclick="setColor('#0ff')">Cyan</button>
  <button onclick="setColor('#f0f')">Purple</button>
  <button onclick="setColor('#0f0')">Green</button>
</div>

<!-- CHARACTERS -->
<div id="charsScreen" class="screen">
  <button class="back-btn" onclick="back()">⬅ Back</button>
  <h3>Characters</h3>
  <button onclick="pickChar('😈')">Devil</button>
  <button onclick="pickChar('🤖')">Bot</button>
  <button onclick="pickChar('👽')">Alien</button>
</div>

<!-- LEADERBOARD -->
<div id="leaderboardScreen" class="screen">
  <button class="back-btn" onclick="back()">⬅ Back</button>
  <h3>Leaderboard</h3>
  <div id="lb"></div>
</div>

</div>

<div class="alert" id="alert"></div>
<div class="levelup" id="levelup">LEVEL UP!</div>

<script>
const qs=id=>document.getElementById(id)
let currentUser=null
let history=[]
let data={coins:0,multi:1,level:1,color:'#0ff',char:'😈'}

function save(){
  localStorage.setItem("user_"+currentUser,JSON.stringify(data))
  updateLeaderboard()
}
function load(){
  const d=localStorage.getItem("user_"+currentUser)
  if(d) data=JSON.parse(d)
}
function login(){
  const u=qs("user").value
  const p=qs("pass").value
  if(!u||!p) return alertMsg("Fill fields")
  currentUser=u
  load()
  show("gameScreen",true)
  updateUI()
}
function show(id,reset){
  if(!reset){
    const cur=document.querySelector(".screen.active")
    if(cur) history.push(cur.id)
  }
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
  qs(id).classList.add("active")
  if(id==="leaderboardScreen") renderLB()
}
function back(){
  const prev=history.pop()||"gameScreen"
  show(prev,true)
}
qs("tapBtn").onclick=()=>{
  data.coins+=data.multi
  if(data.coins>=data.level*500){
    data.level++
    lvlUp()
  }
  save();updateUI()
}
function buyUpgrade(x){
  const cost=x===2?100:x===5?500:2000
  if(data.coins<cost) return alertMsg("Not enough coins")
  data.coins-=cost
  data.multi+=x
  save();updateUI()
}
function updateUI(){
  qs("coins").textContent=data.coins
  qs("multi").textContent=data.multi
  qs("tapBtn").style.background=`radial-gradient(circle at top,${data.color},#000)`
  qs("tapBtn").textContent=data.char
}
function alertMsg(t){
  const a=qs("alert")
  a.textContent=t
  a.classList.add("show")
  setTimeout(()=>a.classList.remove("show"),1500)
}
function lvlUp(){
  const l=qs("levelup")
  l.classList.add("show")
  setTimeout(()=>l.classList.remove("show"),1200)
}
function setColor(c){
  data.color=c;save();updateUI()
}
function pickChar(c){
  data.char=c;save();updateUI()
}
function updateLeaderboard(){
  let lb=JSON.parse(localStorage.getItem("leaderboard")||"{}")
  lb[currentUser]={coins:data.coins,level:data.level}
  localStorage.setItem("leaderboard",JSON.stringify(lb))
}
function renderLB(){
  const lb=JSON.parse(localStorage.getItem("leaderboard")||"{}")
  qs("lb").innerHTML=Object.entries(lb)
    .sort((a,b)=>b[1].coins-a[1].coins)
    .map(([u,d])=>`<div>${u} — 🪙${d.coins} | Lv ${d.level}</div>`).join("")
}
</script>
</body>
</html>
