<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tap Game</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{
  background:#0d0d0d;
  color:#fff;
  display:flex;
  justify-content:center;
}
#app{
  width:100%;
  max-width:420px;
  padding:16px;
  transform-origin:top center;
}
.screen{display:none}
.screen.active{display:block}

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}
.stat{
  background:#111;
  padding:8px 12px;
  border-radius:10px;
  box-shadow:0 0 8px #0ff;
}

.tap{
  width:100%;
  height:220px;
  border-radius:50%;
  background:#0ff;
  color:#000;
  font-size:28px;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:center;
  user-select:none;
  touch-action:manipulation;
  box-shadow:0 0 30px #0ff;
}
.tap:active{transform:scale(.94)}

.section{
  margin-top:20px;
  background:#111;
  padding:12px;
  border-radius:12px;
}

button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:#0ff;
}

.nav{
  display:flex;
  gap:8px;
  margin-top:16px;
}
.nav button{flex:1}

.back{
  width:auto;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#111;
  border:none;
  color:#fff;
  border-radius:10px;
}

.alert{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:10px 16px;
  border-radius:10px;
  opacity:0;
  transition:.3s;
}
.alert.show{opacity:1}
</style>
</head>

<body>
<div id="app">

<!-- LOGIN -->
<div id="login" class="screen active">
  <h2>Tap Game</h2>
  <input id="u" placeholder="Username">
  <input id="p" type="password" placeholder="Password">
  <button onclick="login()">Login / Signup</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="top">
    <div class="stat">🪙 <span id="coins">0</span></div>
    <div class="stat">x<span id="multi">1</span></div>
  </div>

  <div id="tap" class="tap">TAP</div>

  <div class="section">
    <b>Upgrades</b>
    <button onclick="buy(2,100)">2x – 100</button>
    <button onclick="buy(5,500)">5x – 500</button>
    <button onclick="buy(10,2000)">10x – 2000</button>
  </div>

  <div class="nav">
    <button onclick="go('colors')">🎨</button>
    <button onclick="go('chars')">😈</button>
    <button onclick="go('lb')">🏆</button>
    <button onclick="go('settings')">⚙️</button>
  </div>
</div>

<!-- COLORS -->
<div id="colors" class="screen">
  <button class="back" onclick="back()">⬅</button>
  <button onclick="color('#0ff')">Cyan</button>
  <button onclick="color('#f0f')">Purple</button>
  <button onclick="color('#0f0')">Green</button>
</div>

<!-- CHARS -->
<div id="chars" class="screen">
  <button class="back" onclick="back()">⬅</button>
  <button onclick="char('TAP')">Classic</button>
  <button onclick="char('😈')">Devil</button>
  <button onclick="char('🤖')">Bot</button>
</div>

<!-- LEADERBOARD -->
<div id="lb" class="screen">
  <button class="back" onclick="back()">⬅</button>
  <div id="list"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
  <button class="back" onclick="back()">⬅</button>
  <label>UI Size</label>
  <input type="range" min="0.85" max="1.2" step="0.01"
    oninput="scale(this.value)">
</div>

</div>

<div id="alert" class="alert"></div>

<script>
const qs=i=>document.getElementById(i)
let user=null,history=[]
let d={coins:0,m:1,c:"#0ff",t:"TAP",s:1}

function login(){
  user=qs("u").value
  if(!user)return
  let x=localStorage.getItem("u_"+user)
  if(x)d=JSON.parse(x)
  go("game",true);ui()
}
function save(){
  localStorage.setItem("u_"+user,JSON.stringify(d))
  let lb=JSON.parse(localStorage.lb||"{}")
  lb[user]=d.coins
  localStorage.lb=JSON.stringify(lb)
}
function go(id,r){
  if(!r){
    let c=document.querySelector(".screen.active")
    if(c)history.push(c.id)
  }
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
  qs(id).classList.add("active")
  if(id==="lb")lb()
}
function back(){go(history.pop()||"game",true)}
qs("tap").onclick=()=>{d.coins+=d.m;save();ui()}
function buy(x,c){
  if(d.coins<c)return msg("no coins")
  d.coins-=c;d.m+=x;save();ui()
}
function color(c){d.c=c;ui();save()}
function char(t){d.t=t;ui();save()}
function scale(v){d.s=v;qs("app").style.transform=`scale(${v})`;save()}
function ui(){
  qs("coins").textContent=d.coins
  qs("multi").textContent=d.m
  qs("tap").style.background=d.c
  qs("tap").textContent=d.t
}
function lb(){
  let lb=JSON.parse(localStorage.lb||"{}")
  qs("list").innerHTML=Object.entries(lb)
  .sort((a,b)=>b[1]-a[1])
  .map(x=>`${x[0]} — ${x[1]} 🪙`).join("<br>")
}
function msg(t){
  let a=qs("alert")
  a.textContent=t;a.classList.add("show")
  setTimeout(()=>a.classList.remove("show"),1000)
}
let sx=0
document.addEventListener("touchstart",e=>sx=e.touches[0].clientX)
document.addEventListener("touchend",e=>{
  if(e.changedTouches[0].clientX-sx>80)back()
})
</script>
</body>
</html>
