<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap-to-Earn Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

  body {
    background-color: #0d0d0d;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 20px;
  }

  h1 { margin-bottom: 10px; color: #0ff; text-shadow: 0 0 10px #0ff, 0 0 20px #0ff; }

  .counter, .multiplier { font-size: 1.5rem; margin: 5px 0; color: #0ff; text-shadow: 0 0 5px #0ff, 0 0 10px #0ff; }

  .tap-button {
    margin: 30px 0;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, #0ff, #00f);
    box-shadow: 0 0 20px #0ff, 0 0 40px #0ff inset;
    color: #fff;
    font-size: 2rem;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .tap-button:active { transform: scale(0.95); box-shadow: 0 0 40px #0ff inset, 0 0 20px #0ff; }

  .shop { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; }

  .shop button {
    padding: 15px;
    border-radius: 12px;
    border: none;
    background-color: #111;
    color: #0ff;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 0 10px #0ff;
    transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
  }

  .shop button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #0ff, 0 0 10px #0ff inset;
    background-color: #222;
  }

  .alert { color: #f0f; font-size: 0.9rem; margin-top: 5px; text-align: center; opacity: 0; transition: opacity 0.3s; }

  @media (max-width: 500px) {
    .tap-button { width: 150px; height: 150px; font-size: 1.5rem; }
  }
</style>
</head>
<body>

<h1>Tap-to-Earn</h1>
<div class="counter">Coins: <span id="coins">0</span></div>
<div class="multiplier">Multiplier: <span id="multiplier">1x</span></div>

<button class="tap-button" id="tapButton">TAP</button>

<div class="shop">
  <button data-id="2">Upgrade 2x (<span class="cost">100</span> coins)</button>
  <button data-id="5">Upgrade 5x (<span class="cost">500</span> coins)</button>
  <button data-id="10">Upgrade 10x (<span class="cost">2000</span> coins)</button>
</div>

<div class="alert" id="alertMsg">Not enough coins!</div>

<script>
let coins = parseInt(localStorage.getItem('coins')) || 0;
let multiplier = parseInt(localStorage.getItem('multiplier')) || 1;

// Track upgrade costs dynamically
let upgradeCosts = {
  2: parseInt(localStorage.getItem('cost2')) || 100,
  5: parseInt(localStorage.getItem('cost5')) || 500,
  10: parseInt(localStorage.getItem('cost10')) || 2000
};

const coinsEl = document.getElementById('coins');
const multiplierEl = document.getElementById('multiplier');
const tapButton = document.getElementById('tapButton');
const alertMsg = document.getElementById('alertMsg');
const shopButtons = document.querySelectorAll('.shop button');

function updateUI() {
  coinsEl.textContent = coins;
  multiplierEl.textContent = multiplier + 'x';
  shopButtons.forEach(btn => {
    const id = btn.getAttribute('data-id');
    btn.querySelector('.cost').textContent = upgradeCosts[id];
  });
}

function showAlert(message) {
  alertMsg.textContent = message;
  alertMsg.style.opacity = 1;
  setTimeout(() => { alertMsg.style.opacity = 0; }, 1000);
}

tapButton.addEventListener('click', () => {
  coins += multiplier;
  localStorage.setItem('coins', coins);
  updateUI();
});

shopButtons.forEach(button => {
  button.addEventListener('click', () => {
    const id = button.getAttribute('data-id');
    const cost = upgradeCosts[id];

    if (coins >= cost) {
      coins -= cost;
      multiplier = parseInt(id);
      upgradeCosts[id] = Math.floor(cost * 2.5); // scale cost after purchase
      localStorage.setItem('coins', coins);
      localStorage.setItem('multiplier', multiplier);
      localStorage.setItem('cost' + id, upgradeCosts[id]);
      updateUI();
    } else {
      showAlert('Not enough coins!');
    }
  });
});

updateUI();
</script>

</body>
</html>
